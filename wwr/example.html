<!DOCTYPE html>
<html>
<head>
    <style>
        .flex-container {
            display: flex;
        }
        .flex-box {
            flex: 1; /* This makes each flex box take up equal space */
            padding: 20px;
            border: 1px solid #000;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="flex-container">
        <div class="flex-box">
            <!-- Content for the first flex box -->
            <h2>Flex Box 1</h2>
            <p>This is the content for the first flex box.</p>
        </div>
        <div class="flex-box">
            <!-- Content for the second flex box -->
            <h2>Flex Box 2</h2>
            <p>This is the content for the second flex box.</p>
        </div>
    </div>
</body>
</html>
